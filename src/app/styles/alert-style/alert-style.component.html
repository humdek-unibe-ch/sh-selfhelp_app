<div #alert [class]="'alert ' + getCss() + ' alert-' + getFieldContent('type')">
  @if (getFieldContent('is_dismissable') === '1') {
    <button type="button" class="close" data-dismiss="alert" (click)="dismiss()"
      aria-label="Close">
      <span aria-hidden="true">&times;</span>
    </button>
  }
  @for (child of style.children; track child) {
    <app-basic-style [style]="child" [url]="url" [ionContent]="ionContent" [parentForm]="parentForm">
    </app-basic-style>
  }
</div>
