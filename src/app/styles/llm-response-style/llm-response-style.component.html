<div [class]="getCss()">
  <!-- Loading state while form is submitting -->
  @if (showLoading) {
    <div class="llm-response-loading">
      <div class="llm-loading-indicator">
        <ion-spinner name="crescent" color="primary"></ion-spinner>
        <div class="llm-loading-text">
          <span class="llm-thinking-dots">
            <span></span><span></span><span></span>
          </span>
          Generating response...
        </div>
      </div>
    </div>
  }

  <!-- Read-only mode: render content as HTML/markdown -->
  @if (!isEditable && !showLoading) {
    <div class="llm-response-content" [innerHTML]="content"></div>
  }

  <!-- Edit mode: textarea for editing -->
  @if (isEditable) {
    <div class="llm-response-edit">
      <ion-textarea
        [(ngModel)]="editValue"
        [attr.name]="fieldName"
        rows="4"
        autoGrow="true"
        class="llm-response-textarea"
        (ionInput)="onValueChange($event.detail.value || '')">
      </ion-textarea>
    </div>
  }

  <!-- Children -->
  @for (child of style.children; track child) {
    <app-basic-style [style]="child" [url]="url" [ionContent]="ionContent" [parentForm]="parentForm"></app-basic-style>
  }
</div>
