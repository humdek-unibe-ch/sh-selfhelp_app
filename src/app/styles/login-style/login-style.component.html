<ion-card [class]="getCss()">
  <ion-card-header [class]="'mobile-card-header card-' + getFieldContent('type')" [color]="getFieldContent('type')">
    <ion-card-title>{{getFieldContent('login_title')}}</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <form [formGroup]="form" [class]="getCss()" (keyup.enter)="login(form.value)">
      @if (!this.style.anonymous_users) {
        <ion-item>
          <ion-input appAutofill type="email" inputmode="email" autocomplete="email" formControlName="email"
            [placeholder]="getFieldContent('label_user')">
          </ion-input>
        </ion-item>
      }
      @if (this.style.anonymous_users) {
        <ion-item>
          <ion-input appAutofill type="text" autocomplete="username" formControlName="user_name" [placeholder]="getFieldContent('label_user')">
          </ion-input>
        </ion-item>
      }
      <ion-item>
        <ion-input appAutofill type="password" autocomplete="current-password" formControlName="password"
          [placeholder]="getFieldContent('label_pw')">
        </ion-input>
      </ion-item>
      @if (hasKeychainCredentials) {
        <ion-button color="medium" fill="outline" size="small" (click)="login(form.value)" class="w-100 mt-2">
          <ion-icon name="key-outline" slot="start"></ion-icon>
          {{ 'login.use_saved_password' | translate }}
        </ion-button>
      }
      <ion-button [color]="getFieldContent('type')" size="small" [disabled]="!form.valid"
        [class]="'btn-' + getFieldContent('type')" (click)="login(form.value)" class="w-100 mt-3"
        [disabled]="!form.valid">
      {{getFieldContent('label_login')}}</ion-button>
    </form>
    @if (this.outputResetPassword()) {
      <a [class]="'small float-right text-'+getFieldContent('type')"
        (click)="forgottenPassword()">
        {{getFieldContent('label_pw_reset')}}
      </a>
    }
  </ion-card-content>
</ion-card>
