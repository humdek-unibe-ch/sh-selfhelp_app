@if (style.show_survey) {
  <div>
    @if (!isContainer()) {
      <iframe #iframe [class]="getCss()" scrolling="no" frameborder="0"
      [src]="getQualtricsUrl() | safe: 'resourceUrl'" [attr.data-time]="style.time"></iframe>
    }
    @for (child of style.children; track child) {
      <app-basic-style [style]="child" [url]="url" [ionContent]="ionContent">
      </app-basic-style>
    }
  </div>
}
@if (!style.show_survey && style.alert !== '') {
  <div class="m-3 alert alert-danger">
    <div [innerHTML]="style['alert']"></div>
  </div>
}
