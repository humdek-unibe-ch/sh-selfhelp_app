<ion-row>
  <ion-col>
    <button ion-button full (click)="captureAudio()">Capture Audio</button>
  </ion-col>
  <ion-col>
    <button ion-button full (click)="captureVideo()">Capture Video</button>
  </ion-col>
</ion-row>

<video controls autoplay #myvideo>
</video>

<ion-list>
  @for (f of files; track f) {
    <ion-item-sliding>
      <ion-item (click)="openFile(f)">
        @if (f.name.endsWith('jpg')) {
          <ion-icon name="image" slot="start"></ion-icon>
        }
        @if (f.name.endsWith('MOV') || f.name.endsWith('mp4')) {
          <ion-icon name="videocam" slot="start"></ion-icon>
        }
        @if (f.name.endsWith('wav')) {
          <ion-icon name="mic" slot="start"></ion-icon>
        }
        <ion-label class="ion-text-wrap">
          {{ f.name }}
          <p>{{ f.fullPath }}</p>
        </ion-label>
      </ion-item>
      <ion-item-options side="start">
        <ion-item-option (click)="deleteFile(f)" color="danger">
          <ion-icon name="trash" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  }
</ion-list>
