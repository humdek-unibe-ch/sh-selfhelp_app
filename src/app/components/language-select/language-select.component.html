@if (selfHelp.languages && selfHelp.user_language) {
  <ion-item>
    <ion-select [label]="'language' | translate" interface="action-sheet" [(ngModel)]="this.selfHelp.user_language" [compareWith]="compareWith"
      (ionChange)="refreshAfterLanguageChange()">
      @for (lang of this.selfHelp.languages; track lang) {
        <ion-select-option [value]="lang.id">{{lang.title}}
        </ion-select-option>
      }
    </ion-select>
  </ion-item>
}
