<div class="chat-input-wrapper">
    <div class="input-row">
        <ion-button *ngIf="messageText.length > 0"
            (click)="clear()"
            size="small"
            fill="clear"
            color="medium"
            class="clear-btn">
            <ion-icon name="close-circle" slot="icon-only"></ion-icon>
        </ion-button>
        <ion-textarea
            [(ngModel)]="messageText"
            [placeholder]="placeholder"
            [rows]="rows"
            autoGrow="true"
            [disabled]="disabled"
            [maxlength]="maxLength > 0 ? maxLength : null"
            (keydown)="onKeyDown($event)"
            class="chat-textarea">
        </ion-textarea>
        <ion-button *ngIf="speechAvailable"
            (click)="toggleRecording()"
            size="small"
            [fill]="isRecording ? 'solid' : 'clear'"
            [color]="isRecording ? 'danger' : 'medium'"
            class="mic-btn"
            [class.recording]="isRecording">
            <ion-icon [name]="isRecording ? 'radio-button-on' : 'mic'" slot="icon-only"></ion-icon>
        </ion-button>
        <ion-button
            [disabled]="!canSend"
            (click)="send()"
            size="small"
            fill="solid"
            color="primary"
            shape="round"
            class="send-btn">
            <ion-icon name="send" slot="icon-only"></ion-icon>
        </ion-button>
    </div>
    <div *ngIf="showCharCount && maxLength > 0" class="char-count" [class.near-limit]="isNearLimit">
        {{ characterCount }}/{{ maxLength }}
    </div>
</div>
