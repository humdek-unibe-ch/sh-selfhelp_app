<div class="chat-input-wrapper">
    <ion-textarea
        [(ngModel)]="messageText"
        [placeholder]="placeholder"
        [rows]="rows"
        autoGrow="true"
        [disabled]="disabled"
        [maxlength]="maxLength > 0 ? maxLength : null"
        (keydown)="onKeyDown($event)"
        class="chat-textarea">
    </ion-textarea>
    <div class="actions-row">
        <div class="left-actions">
            <ion-button *ngIf="speechAvailable"
                (click)="toggleRecording()"
                fill="clear"
                size="small"
                [color]="isRecording ? 'danger' : 'medium'"
                class="action-btn"
                [class.recording]="isRecording">
                <ion-icon [name]="isRecording ? 'radio-button-on' : 'mic'" slot="icon-only"></ion-icon>
            </ion-button>
        </div>
        <div class="center-info">
            <span *ngIf="showCharCount && maxLength > 0" class="char-count" [class.near-limit]="isNearLimit">
                {{ characterCount }}/{{ maxLength }}
            </span>
        </div>
        <div class="right-actions">
            <ion-button
                fill="clear"
                size="small"
                color="medium"
                (click)="clear()"
                [disabled]="messageText.length === 0"
                class="action-btn">
                <ion-icon name="close" slot="icon-only"></ion-icon>
            </ion-button>
            <ion-button
                [disabled]="!canSend"
                (click)="send()"
                fill="solid"
                size="small"
                color="primary"
                shape="round"
                class="send-btn">
                <ion-icon name="send" slot="icon-only"></ion-icon>
            </ion-button>
        </div>
    </div>
</div>
