<ion-header translucent>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="#" (click)="close()"></ion-back-button>
    </ion-buttons>
    <ion-title>{{getTitle()}}</ion-title>
  </ion-toolbar>
</ion-header>
@if (selfHelp.urls[url]) {
  <ion-content #content  fullscreen>
    @for (style of selfHelp.urls[url].content; track style) {
      <app-basic-style [style]="style" [url]="url" [ionContent]="content"></app-basic-style>
    }
  </ion-content>
}
