<div class="chat-msg" [class.chat-msg-own]="isOwn" [class.chat-msg-system]="bubbleType === 'system'">
  @if (senderLabel) {
    <div class="chat-msg-sender" [attr.data-type]="bubbleType">
      {{ senderLabel }}
    </div>
  }
  <div class="chat-msg-bubble" [attr.data-type]="bubbleType">
    <app-markdown-renderer [content]="displayContent"></app-markdown-renderer>
  </div>
  @if (labels && labels.length > 0) {
    <div class="chat-msg-labels">
      @for (l of labels; track l) {
        <span class="chat-msg-label">{{ l.name || l }}</span>
      }
    </div>
  }
  @if (timestamp) {
    <div class="chat-msg-time" [class.chat-msg-time-own]="isOwn">
      {{ timestamp }}
    </div>
  }
</div>
